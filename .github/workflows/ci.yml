name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded runs on PRs for fast feedback, but never on main — a main
  # run may be mid GitHub Pages deploy, which must not be killed (#111).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Docs lint runs in its own job with full history because docs:lint-pages
  # reads `git log -1 -- <source>` and needs each linked source file's real
  # last-modification date. The scripts use only Node built-ins, so the job
  # skips pnpm install / dev:prepare and finishes in seconds. Kept separate
  # from `build` so the rest of CI can stay on a shallow checkout.
  docs-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Lint docs pages
        run: node scripts/docs-lint.mjs --strict

      - name: Check docs internal links
        run: node scripts/docs-link-check.mjs

      - name: Check guide internal links (AGENTS.md + .github/contributing)
        run: node scripts/md-internal-links.mjs

      - name: Test docs-lint scripts
        run: node --test "scripts/__tests__/**/*.test.mjs"

      - name: Lint GitHub Actions workflows (actionlint)
        # Catches workflow mistakes (bad expressions, job/needs wiring, shell
        # issues via shellcheck on the runner) on every PR — the publish path in
        # release.yml has no other gate. Pinned release asset, not a mutable tag.
        run: |
          ACTIONLINT_VERSION=1.7.7
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" | tar -xz -C /tmp actionlint
          /tmp/actionlint -color

  # Installs dependencies and runs dev:prepare once; the generated outputs
  # (packages/jssdk/dist, .nuxt type dirs) are uploaded as an artifact so
  # the parallel lint / typecheck / build / docs-build jobs can restore them
  # without repeating the prepare step.
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NUXT_PUBLIC_USE_AI: false
      NUXT_PUBLIC_USE_TAB_B24FRAME: false
      NUXT_PUBLIC_SITE_URL: https://bitrix24.github.io
      NUXT_PUBLIC_BASE_URL: /b24jssdk
      NUXT_PUBLIC_CANONICAL_URL: https://bitrix24.github.io
      NUXT_PUBLIC_GIT_URL: https://github.com/bitrix24/b24jssdk
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare
        run: pnpm run dev:prepare

      - name: Upload prepared workspace
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prepared-workspace
          path: |
            packages/jssdk/dist
            packages/jssdk-nuxt/dist
            packages/jssdk-nuxt/.nuxt
            docs/.nuxt
            playgrounds/nuxt/.nuxt
          include-hidden-files: true
          retention-days: 1

  lint:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download prepared workspace
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: prepared-workspace

      - name: Lint
        run: pnpm run lint

      - name: Lint guide Markdown (markdownlint)
        run: pnpm run lint:md

  typecheck:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NUXT_PUBLIC_USE_AI: false
      NUXT_PUBLIC_USE_TAB_B24FRAME: false
      NUXT_PUBLIC_SITE_URL: https://bitrix24.github.io
      NUXT_PUBLIC_BASE_URL: /b24jssdk
      NUXT_PUBLIC_CANONICAL_URL: https://bitrix24.github.io
      NUXT_PUBLIC_GIT_URL: https://github.com/bitrix24/b24jssdk
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download prepared workspace
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: prepared-workspace

      - name: Typecheck
        # Includes docs:typecheck-blocks — type-checks ```ts fences in docs/content/docs/**/*.md
        # against @bitrix24/b24jssdk. Runs after dev:prepare so dist/ types are available.
        run: pnpm run typecheck

  test:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download prepared workspace
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: prepared-workspace

      - name: Unit tests (no portal required)
        # Integration and load tests require B24_HOOK — run locally or in a
        # dedicated environment with secrets. See .github/contributing/testing.md.
        run: pnpm run package-jssdk:test:run-unit

      - name: Security audit
        run: pnpm audit --prod --audit-level=high

  build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download prepared workspace
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: prepared-workspace

      - name: Build (jssdk)
        run: pnpm --filter ./packages/jssdk build

      - name: Build (jssdk-nuxt)
        # Requires packages/jssdk-nuxt/.nuxt/tsconfig.json (from artifact) to resolve
        # tsconfig "extends". jssdk must be built first so @bitrix24/b24jssdk resolves.
        run: pnpm --filter ./packages/jssdk-nuxt build

      - name: Verify jssdk-nuxt version token was replaced (#119)
        # The real build (above, not the dev:prepare stub) must substitute the
        # __SDK_VERSION__ placeholder in meta.version from package.json. Catch a
        # build-config regression here, on every PR — not only at publish time.
        shell: bash
        run: |
          PKG_VER=$(node -p "require('./packages/jssdk-nuxt/package.json').version")
          DIST=packages/jssdk-nuxt/dist/module.mjs
          if grep -q "__SDK_VERSION__" "$DIST"; then
            echo "::error::__SDK_VERSION__ left unreplaced in $DIST — check packages/jssdk-nuxt/build.config.ts"
            exit 1
          fi
          if ! grep -qF "\"$PKG_VER\"" "$DIST"; then
            echo "::error::version \"$PKG_VER\" (from package.json) not found in $DIST — wrong or empty replacement"
            exit 1
          fi
          echo "jssdk-nuxt meta.version = $PKG_VER (token replaced) — OK"

  # Builds the documentation site. On PRs it only validates that the docs
  # generate cleanly (broken builds used to slip through — they only ran in
  # deploy.yml on push to main). On a push / manual dispatch to main it ALSO
  # produces the GitHub Pages artifact, which the `deploy` job below ships — so
  # the site is built once, not twice (was: here + deploy.yml) (#111).
  # Note: prepared-workspace is needed here because Vite (via nuxt generate)
  # crawls workspace packages including jssdk-nuxt/src/runtime/plugin.ts,
  # which resolves tsconfig "extends" from packages/jssdk-nuxt/.nuxt/.
  docs-build:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # pages: read lets configure-pages derive the base path on a main deploy build.
    permissions:
      contents: read
      pages: read
    env:
      NUXT_PUBLIC_USE_AI: false
      NUXT_PUBLIC_USE_TAB_B24FRAME: false
      NUXT_PUBLIC_SITE_URL: https://bitrix24.github.io
      NUXT_PUBLIC_BASE_URL: /b24jssdk
      NUXT_PUBLIC_CANONICAL_URL: https://bitrix24.github.io
      NUXT_PUBLIC_GIT_URL: https://github.com/bitrix24/b24jssdk
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download prepared workspace
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: prepared-workspace

      # Pages plumbing only on a main deploy build; PRs just validate the build.
      - name: Setup Pages
        if: github.workflow == 'ci' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build docs
        run: pnpm run docs:generate

      - name: Create Pages artifact
        if: github.workflow == 'ci' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          mkdir -p combined-artifact
          cp -r docs/.output/public/* combined-artifact/
          touch combined-artifact/.nojekyll

      - name: Upload Pages artifact
        if: github.workflow == 'ci' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: combined-artifact

  # Publishes the docs site to GitHub Pages, reusing the artifact built once by
  # docs-build (no second docs:generate). The `github.workflow == 'ci'` guard
  # makes it run only on a direct push / manual dispatch to main — never on PRs,
  # and never when ci.yml is reused via workflow_call by release.yml. (#111)
  deploy:
    needs: docs-build
    if: github.workflow == 'ci' && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # Gate job: satisfies the "ci" required status check in branch protection.
  # Fails if any upstream job failed or was cancelled. `deploy` is included so a
  # broken main deploy reddens the check; it is skipped (a pass) on PRs.
  ci:
    needs: [docs-lint, lint, typecheck, test, build, docs-build, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs passed."
