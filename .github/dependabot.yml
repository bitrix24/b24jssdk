# Keeps the GitHub Actions pinned in .github/workflows/* current, so the class
# of problem in #103 (an action stranded on a removed Node runtime) is caught
# automatically instead of by hand. All action bumps are collected into a single
# grouped weekly PR to keep the noise down.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "tooling"
    groups:
      github-actions:
        patterns:
          - "*"

  # npm: keep direct dependencies current so the window in which a fixed upstream
  # version sits unadopted shrinks. Transitive CVEs are still caught after the
  # fact by `pnpm audit --prod --audit-level=high` (ci.yml) plus the override pins
  # in pnpm-workspace.yaml. Minor + patch bumps are grouped into a single weekly
  # PR to keep the noise down on the heavy Nuxt dependency tree; majors come
  # individually (rare, and they need human review anyway).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
