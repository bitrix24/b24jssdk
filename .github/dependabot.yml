# Keeps the GitHub Actions pinned in .github/workflows/* current, so the class
# of problem in #103 (an action stranded on a removed Node runtime) is caught
# automatically instead of by hand. All action bumps are collected into a single
# grouped weekly PR to keep the noise down.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Only propose versions that have aged a few days, so a freshly-published
    # release can't land before it has been vetted — and a group re-resolution is
    # less likely to pull a <24h dependency that the pnpm `minimumReleaseAge`
    # supply-chain guard (ci.yml `prepare`) then rejects.
    cooldown:
      default-days: 3
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "tooling"
    groups:
      github-actions:
        patterns:
          - "*"

  # npm: keep direct dependencies current so the window in which a fixed upstream
  # version sits unadopted shrinks. Transitive CVEs are still caught after the
  # fact by `pnpm audit --audit-level=moderate` (ci.yml) plus the override pins
  # in pnpm-workspace.yaml. Minor + patch bumps are grouped into a single weekly
  # PR to keep the noise down on the heavy Nuxt dependency tree; majors come
  # individually (rare, and they need human review anyway).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # See the cooldown note above — most relevant here, where the 36-package
    # group re-resolution kept pulling just-published transitive deps that
    # failed the pnpm `minimumReleaseAge` guard in CI.
    cooldown:
      default-days: 3
    commit-message:
      prefix: "deps"
    # NOTE: no `labels:` here — the previous `dependencies` label does not exist
    # in this repo, which made Dependabot log a config error on every npm PR.
    # Re-add a `labels:` block once the label is created in the repo settings.
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
