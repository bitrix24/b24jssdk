<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B24 · проверка кастомного USER_TYPE_ID (#269)</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font: 14px/1.5 -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      margin: 0; padding: 16px; background: #0e1116; color: #e6edf3;
    }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: #8b949e; margin: 0 0 14px; font-size: 13px; }
    .bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    button {
      font: inherit; cursor: pointer; border: 1px solid #30363d; border-radius: 8px;
      padding: 8px 14px; background: #21262d; color: #e6edf3;
    }
    button.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    button:disabled { opacity: .5; cursor: default; }
    #log {
      background: #010409; border: 1px solid #30363d; border-radius: 10px;
      padding: 12px; min-height: 220px; white-space: pre-wrap; word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12.5px;
    }
    .line { padding: 2px 0; border-bottom: 1px dashed #161b22; }
    .step { color: #d2a8ff; font-weight: 700; margin-top: 8px; }
    .ok   { color: #3fb950; }
    .err  { color: #f85149; font-weight: 700; }
    .info { color: #58a6ff; }
    .dim  { color: #8b949e; }
    .verdict { margin-top: 12px; padding: 12px; border-radius: 10px; font-weight: 700; }
    .verdict.good { background: #0f2b16; border: 1px solid #238636; color: #57d364; }
    .verdict.bad  { background: #2d1213; border: 1px solid #b62324; color: #ff7b72; }
    code { background: #161b22; padding: 1px 5px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Проверка кастомного <code>USER_TYPE_ID</code> в контексте приложения</h1>
  <p class="sub">Issue&nbsp;#269 · <code>crm.deal.userfield.add</code> с app-provided типом. Запускается в iframe Bitrix24 (OAuth-контекст приложения) — то, что недоступно вебхуку.</p>

  <div class="bar">
    <button id="run" class="primary" disabled>▶ Запустить проверку</button>
    <button id="clear">Очистить лог</button>
    <span id="status" class="dim" style="align-self:center"></span>
  </div>

  <div id="log"></div>
  <div id="verdict"></div>

  <!-- b24jssdk UMD build (single <script>, deps inlined) -->
  <script src="https://unpkg.com/@bitrix24/b24jssdk@latest/dist/umd/index.min.js"></script>
  <script>
    const $log = document.getElementById('log');
    const $verdict = document.getElementById('verdict');
    const $run = document.getElementById('run');
    const $status = document.getElementById('status');

    // SDK logger → browser console (verbose), plus our on-page log.
    const logger = B24Js.LoggerFactory.createForBrowser('B24/userfield-269', true);

    function log(text, cls = 'info') {
      const div = document.createElement('div');
      div.className = 'line ' + cls;
      div.textContent = text;
      $log.appendChild(div);
      $log.scrollTop = $log.scrollHeight;
    }
    const step = (t) => { log('\n■ ' + t, 'step'); console.group('%c' + t, 'color:#d2a8ff;font-weight:700'); };
    const endStep = () => console.groupEnd();
    const ok = (t) => { log('  ✓ ' + t, 'ok'); console.log('%c✓ ' + t, 'color:#3fb950'); };
    const err = (t) => { log('  ✗ ' + t, 'err'); console.error('✗ ' + t); };
    const info = (t) => { log('  • ' + t, 'dim'); console.log('• ' + t); };

    // Unique names so re-runs never collide; cleaned up at the end.
    const stamp = String(Date.now()).slice(-6);
    const TYPE_ID = 'cs_test_obj_' + stamp;            // custom user type id
    const FIELD_NAME = 'CS_TEST_OBJ_' + stamp;         // deal user field name
    const HANDLER = 'https://apps-dev.cassoft.ru/apps/brokci/objectFormB24';

    let b24 = null;

    /** One REST call with uniform logging; returns {success, result, errors}. */
    async function call(method, params, label) {
      info((label || method) + ' …');
      try {
        const res = await b24.actions.v2.call.make({ method, params: params || {} });
        if (!res.isSuccess) {
          const msgs = res.getErrorMessages().join('; ');
          err(method + ' → ошибка: ' + msgs);
          return { success: false, result: undefined, errors: msgs };
        }
        const result = res.getData()?.result;
        ok(method + ' → ' + JSON.stringify(result)?.slice(0, 200));
        return { success: true, result, errors: '' };
      } catch (e) {
        // Hard error (e.g. AjaxError) — surface code + message.
        const code = e?.code ? ' [' + e.code + ']' : '';
        err(method + ' → исключение' + code + ': ' + (e?.message || e));
        return { success: false, result: undefined, errors: String(e?.message || e) };
      }
    }

    async function runChecks() {
      $run.disabled = true;
      $verdict.className = '';
      $verdict.textContent = '';
      let userFieldId = null;
      let typeRegistered = false;

      try {
        step('Шаг 1. Контекст приложения');
        info('member: ' + (b24.getAppSid ? 'sid=' + b24.getAppSid() : '—'));
        await call('scope', {}, 'Список scope приложения');
        await call('profile', {}, 'Текущий пользователь (profile)');
        endStep();

        step('Шаг 2. userfieldtype.list — доступно ли приложению?');
        info('Через вебхук этот метод даёт WRONG_AUTH_TYPE («Application context required»).');
        const list = await call('userfieldtype.list', {}, 'Список кастомных типов');
        if (list.success) ok('Приложению метод ДОСТУПЕН (в отличие от вебхука).');
        endStep();

        step('Шаг 3. Регистрируем кастомный тип ' + TYPE_ID);
        const add = await call('userfieldtype.add', {
          USER_TYPE_ID: TYPE_ID, HANDLER, TITLE: 'CS test obj ' + stamp, DESCRIPTION: '#269 check'
        }, 'userfieldtype.add');
        typeRegistered = add.success;
        endStep();

        step('Шаг 4. crm.deal.userfield.add с USER_TYPE_ID=' + TYPE_ID + '  ← суть #269');
        info('Через вебхук это давало ERROR_CORE «Указан неверный пользовательский тип».');
        const field = await call('crm.deal.userfield.add', {
          fields: {
            FIELD_NAME,
            USER_TYPE_ID: TYPE_ID,
            LABEL: 'CS object ' + stamp,
            EDIT_FORM_LABEL: { ru: 'Объект недвижимости (форма)' },
            LIST_COLUMN_LABEL: { ru: 'Объект недвижимости (форма)' }
          }
        }, 'crm.deal.userfield.add');
        if (field.success) userFieldId = field.result;
        endStep();

        // ---- Verdict ----
        if (field.success) {
          $verdict.className = 'verdict good';
          $verdict.textContent =
            '✓ В контексте приложения crm.deal.userfield.add с кастомным типом РАБОТАЕТ (id=' + userFieldId + '). '
            + 'Значит ERROR_CORE из вебхука — это auth-контекст, а не баг SDK/метода.';
        } else {
          $verdict.className = 'verdict bad';
          $verdict.textContent =
            '✗ Даже в приложении вызов не прошёл. Смотрите ошибку выше — '
            + 'возможно тип не зарегистрировался (шаг 3) или приложению не выданы права на управление полями.';
        }
      } catch (e) {
        err('Непредвиденная ошибка: ' + (e?.message || e));
      } finally {
        step('Шаг 5. Уборка (удаляем созданное)');
        if (userFieldId) await call('crm.deal.userfield.delete', { id: userFieldId }, 'Удаляем user field ' + userFieldId);
        if (typeRegistered) await call('userfieldtype.delete', { USER_TYPE_ID: TYPE_ID }, 'Удаляем тип ' + TYPE_ID);
        ok('Готово. Портал оставлен в исходном состоянии.');
        endStep();
        $run.disabled = false;
      }
    }

    async function main() {
      try {
        log('Инициализация B24Frame…', 'info');
        b24 = await B24Js.initializeB24Frame();
        $status.textContent = 'B24Frame готов';
        ok('B24Frame инициализирован (OAuth-контекст приложения).');

        // Install flow: first open after install must finish the installation.
        if (b24.isInstallMode) {
          info('Режим установки — вызываю installFinish().');
          try { await b24.installFinish(); ok('installFinish() выполнен.'); }
          catch (e) { info('installFinish: ' + (e?.message || e)); }
        }

        $run.disabled = false;
        info('Нажмите «Запустить проверку».');
      } catch (e) {
        err('Не удалось инициализировать B24Frame: ' + (e?.message || e));
        err('Откройте страницу ВНУТРИ Bitrix24 (как приложение), а не напрямую в браузере.');
      }
    }

    $run.addEventListener('click', runChecks);
    document.getElementById('clear').addEventListener('click', () => { $log.innerHTML = ''; $verdict.className = ''; $verdict.textContent = ''; });
    document.addEventListener('DOMContentLoaded', main);
  </script>
</body>
</html>
