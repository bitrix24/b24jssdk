name: NPM publish JS SDK Nuxt 🚀

# Publishes @bitrix24/b24jssdk-nuxt (Nuxt module) to npm via OIDC trusted
# publishing.
#
# This is a TOP-LEVEL workflow on purpose. npm's Trusted Publisher entry for the
# package is keyed to this exact workflow filename (`npm-publish-js-sdk-nuxt.yml`);
# the OIDC token exchange 404s if the publishing job runs from any other file. The
# core SDK publishes from its sibling workflow (`npm-publish-js-sdk.yml`).
#
# The published Nuxt module declares a dependency on @bitrix24/b24jssdk at the
# released version. Both workflows fire on the same `release: published` event, so
# in the brief window before the core publish lands an `npm install` of the Nuxt
# module could miss the matching core version. The build itself does not need core
# on npm (it resolves via the workspace), so the package contents are correct; the
# gap only affects an external install during those seconds.
on:
  release:
    types: [ published ]
  workflow_dispatch:

# Least privilege: only the publish job mints an OIDC token (job-level below).
permissions:
  contents: read

# Never run two nuxt publishes at once; do NOT cancel an in-flight publish.
concurrency:
  group: npm-publish-js-sdk-nuxt
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    # See npm-publish-js-sdk.yml for why these permissions are granted here.
    permissions:
      contents: read
      pages: write
      id-token: write

  publish:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify version lockstep across workspaces
        shell: bash
        run: |
          ROOT=$(jq -r .version package.json)
          SDK=$(jq -r .version packages/jssdk/package.json)
          NUXT=$(jq -r .version packages/jssdk-nuxt/package.json)
          if [ "$ROOT" != "$SDK" ] || [ "$ROOT" != "$NUXT" ]; then
            echo "::error::Version mismatch: root=$ROOT jssdk=$SDK nuxt=$NUXT"
            exit 1
          fi
          echo "All packages at version $ROOT"

      - name: Verify package version matches release tag
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          EXPECTED="${TAG#v}"
          ACTUAL=$(jq -r .version packages/jssdk-nuxt/package.json)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Release tag $TAG (expected version $EXPECTED) does not match package.json version $ACTUAL"
            exit 1
          fi

      - name: Verify version is not already published
        shell: bash
        run: |
          PKG=$(jq -r .name packages/jssdk-nuxt/package.json)
          VER=$(jq -r .version packages/jssdk-nuxt/package.json)
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "::error::$PKG@$VER is already published on npm"
            exit 1
          fi
          echo "$PKG@$VER is not yet published — OK to proceed"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare
        run: pnpm run dev:prepare

      - name: Build
        run: pnpm --filter ./packages/jssdk-nuxt build

      - name: Verify version token was replaced
        shell: bash
        run: |
          PKG_VER=$(node -p "require('./packages/jssdk-nuxt/package.json').version")
          DIST=packages/jssdk-nuxt/dist/module.mjs
          if grep -q "__SDK_VERSION__" "$DIST"; then
            echo "::error::__SDK_VERSION__ was not replaced in $DIST — check packages/jssdk-nuxt/build.config.ts (#119)"
            exit 1
          fi
          if ! grep -qF "\"$PKG_VER\"" "$DIST"; then
            echo "::error::version \"$PKG_VER\" (from package.json) not found in $DIST — wrong or empty replacement"
            exit 1
          fi
          echo "module.mjs meta.version = $PKG_VER (token replaced) — OK"

      - name: 'Publish NUXT 🚀'
        shell: bash
        run: |
          VER=$(jq -r .version packages/jssdk-nuxt/package.json)
          # Pre-release → `next` dist-tag, never `latest` (see npm-publish-js-sdk.yml).
          TAG_ARGS=()
          if [[ "$VER" == *-* ]]; then
            TAG_ARGS=(--tag next)
            echo "Pre-release $VER → dist-tag 'next'"
          else
            echo "Stable $VER → dist-tag 'latest'"
          fi
          pnpm --filter ./packages/jssdk-nuxt publish --no-git-checks "${TAG_ARGS[@]}"
