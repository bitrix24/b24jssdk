name: Deploy to Pages 📰
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ${{ matrix.os }}

    # Build only needs to read the repo and the Pages site config (configure-pages
    # GETs it to derive the base path). It does NOT need id-token:write — only the
    # deploy job mints the OIDC token.
    permissions:
      contents: read
      pages: read

    strategy:
      matrix:
        os: [ ubuntu-latest ]
        node: [ 22 ]

    env:
      NUXT_PUBLIC_USE_AI: false
      NUXT_PUBLIC_USE_TAB_B24FRAME: false
      NUXT_PUBLIC_SITE_URL: https://bitrix24.github.io
      NUXT_PUBLIC_BASE_URL: /b24jssdk
      NUXT_PUBLIC_CANONICAL_URL: https://bitrix24.github.io
      NUXT_PUBLIC_GIT_URL: https://github.com/bitrix24/b24jssdk
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: pnpm install

      - name: Prepare
        run: pnpm run dev:prepare

      - name: Generate Docs
        run: pnpm run docs:generate

      - name: Create combined artifact
        run: |
          mkdir -p combined-artifact
          cp -r docs/.output/public/* combined-artifact/
          touch combined-artifact/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: combined-artifact
  deploy:
    # Privileged scope is confined to the deploy step: pages:write to publish and
    # id-token:write for the OIDC token actions/deploy-pages exchanges.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
