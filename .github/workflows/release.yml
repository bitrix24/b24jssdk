name: release 🚀

# Single entry point for cutting a release. Replaces the two former workflows
# (npm-publish-js-sdk.yml + npm-publish-js-sdk-nuxt.yml), which each invoked the
# full CI independently and published in parallel with no shared gate (#177):
#   - one CI invocation instead of two
#   - the two packages publish SEQUENTIALLY (core first, then nuxt — which
#     declares a dependency on @bitrix24/b24jssdk at the released version)
#   - a combined status gate turns the run red on a partial release, so it can't
#     pass unnoticed (npm has no cross-package transaction, so this is the best
#     achievable: ordered + visible, not truly atomic)
on:
  release:
    types: [ published ]
  workflow_dispatch:

# Least privilege: only the publish jobs mint an OIDC token (job-level below).
permissions:
  contents: read

# Never run two releases at once; do NOT cancel an in-flight publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish-jssdk:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify version lockstep across workspaces
        shell: bash
        run: |
          ROOT=$(jq -r .version package.json)
          SDK=$(jq -r .version packages/jssdk/package.json)
          NUXT=$(jq -r .version packages/jssdk-nuxt/package.json)
          if [ "$ROOT" != "$SDK" ] || [ "$ROOT" != "$NUXT" ]; then
            echo "::error::Version mismatch: root=$ROOT jssdk=$SDK nuxt=$NUXT"
            exit 1
          fi
          echo "All packages at version $ROOT"

      - name: Verify package version matches release tag
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          EXPECTED="${TAG#v}"
          ACTUAL=$(jq -r .version packages/jssdk/package.json)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Release tag $TAG (expected version $EXPECTED) does not match package.json version $ACTUAL"
            exit 1
          fi

      - name: Verify version is not already published
        shell: bash
        run: |
          PKG=$(jq -r .name packages/jssdk/package.json)
          VER=$(jq -r .version packages/jssdk/package.json)
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "::error::$PKG@$VER is already published on npm"
            exit 1
          fi
          echo "$PKG@$VER is not yet published — OK to proceed"

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare
        run: pnpm run dev:prepare

      - name: Build
        run: pnpm --filter ./packages/jssdk build

      - name: 'Publish 🚀'
        shell: bash
        run: |
          VER=$(jq -r .version packages/jssdk/package.json)
          # A pre-release (e.g. 1.3.0-rc.1) must NOT take the default `latest`
          # dist-tag, or every `npm install @bitrix24/b24jssdk` would jump onto the
          # RC. Route pre-releases (version contains a `-`) to `next`; stable
          # versions keep `latest`.
          TAG_ARGS=()
          if [[ "$VER" == *-* ]]; then
            TAG_ARGS=(--tag next)
            echo "Pre-release $VER → dist-tag 'next'"
          else
            echo "Stable $VER → dist-tag 'latest'"
          fi
          pnpm --filter ./packages/jssdk publish --no-git-checks "${TAG_ARGS[@]}"

  publish-nuxt:
    # Sequential: only after the core SDK is published, since the published Nuxt
    # module declares a dependency on @bitrix24/b24jssdk at the released version.
    needs: publish-jssdk
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    if: >
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify version lockstep across workspaces
        shell: bash
        run: |
          ROOT=$(jq -r .version package.json)
          SDK=$(jq -r .version packages/jssdk/package.json)
          NUXT=$(jq -r .version packages/jssdk-nuxt/package.json)
          if [ "$ROOT" != "$SDK" ] || [ "$ROOT" != "$NUXT" ]; then
            echo "::error::Version mismatch: root=$ROOT jssdk=$SDK nuxt=$NUXT"
            exit 1
          fi
          echo "All packages at version $ROOT"

      - name: Verify package version matches release tag
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          EXPECTED="${TAG#v}"
          ACTUAL=$(jq -r .version packages/jssdk-nuxt/package.json)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Release tag $TAG (expected version $EXPECTED) does not match package.json version $ACTUAL"
            exit 1
          fi

      - name: Verify version is not already published
        shell: bash
        run: |
          PKG=$(jq -r .name packages/jssdk-nuxt/package.json)
          VER=$(jq -r .version packages/jssdk-nuxt/package.json)
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "::error::$PKG@$VER is already published on npm"
            exit 1
          fi
          echo "$PKG@$VER is not yet published — OK to proceed"

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare
        run: pnpm run dev:prepare

      - name: Build
        run: pnpm --filter ./packages/jssdk-nuxt build

      - name: Verify version token was replaced
        shell: bash
        run: |
          PKG_VER=$(node -p "require('./packages/jssdk-nuxt/package.json').version")
          DIST=packages/jssdk-nuxt/dist/module.mjs
          if grep -q "__SDK_VERSION__" "$DIST"; then
            echo "::error::__SDK_VERSION__ was not replaced in $DIST — check packages/jssdk-nuxt/build.config.ts (#119)"
            exit 1
          fi
          if ! grep -qF "\"$PKG_VER\"" "$DIST"; then
            echo "::error::version \"$PKG_VER\" (from package.json) not found in $DIST — wrong or empty replacement"
            exit 1
          fi
          echo "module.mjs meta.version = $PKG_VER (token replaced) — OK"

      - name: 'Publish NUXT 🚀'
        shell: bash
        run: |
          VER=$(jq -r .version packages/jssdk-nuxt/package.json)
          # Pre-release → `next` dist-tag, never `latest` (see publish-jssdk for
          # the rationale).
          TAG_ARGS=()
          if [[ "$VER" == *-* ]]; then
            TAG_ARGS=(--tag next)
            echo "Pre-release $VER → dist-tag 'next'"
          else
            echo "Stable $VER → dist-tag 'latest'"
          fi
          pnpm --filter ./packages/jssdk-nuxt publish --no-git-checks "${TAG_ARGS[@]}"

  release-status:
    # Combined gate: green only if BOTH packages actually published. A partial
    # release (one published, the other failed) or a publish skipped because CI
    # failed turns the run red with a clear message. Only runs when a publish was
    # intended (a real release, or a manual dispatch on main).
    needs: [ publish-jssdk, publish-nuxt ]
    if: >
      always() &&
      (github.event_name == 'release' ||
       (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    steps:
      - name: Verify both packages published
        shell: bash
        run: |
          JSSDK="${{ needs.publish-jssdk.result }}"
          NUXT="${{ needs.publish-nuxt.result }}"
          if [ "$JSSDK" != "success" ] || [ "$NUXT" != "success" ]; then
            echo "::error::Release incomplete — publish-jssdk=$JSSDK, publish-nuxt=$NUXT. @bitrix24/b24jssdk and @bitrix24/b24jssdk-nuxt may be out of sync on npm. Re-run ONLY the failed job (do NOT use 'Re-run all jobs' — re-running publish-jssdk after it has published trips the already-published guard)."
            exit 1
          fi
          echo "Both @bitrix24/b24jssdk and @bitrix24/b24jssdk-nuxt published at the release version."
